name: Daily Game Data Collection
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run data collection
        run: python "Final File.py"
      - name: Commit updated CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add advanced_games_dataset.csv
          git commit -m "Daily dataset update" || echo "No changes to commit"
          git push
